<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Portal do Aluno — Olimpíadas | SIGA EDUCA</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  theme: {
    extend: {
      colors: {
        "background-page": "#F7FAF8",
        "primary": "#006d37",
        "on-surface": "#121c2a",
        "text-secondary": "#546070",
        "border-subtle": "#d5dde8",
        "surface-container": "#e6eeff",
        "outline": "#6e7a6e"
      },
      fontFamily: { sans: ["Inter", "sans-serif"] }
    }
  }
};
</script>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
#olimpiada-toast[data-type='error'],#olimpiada-toast[data-type='info']{background:#ba1a1a}
</style>
<script src="js/siga-security.js"></script><script src="js/siga-db.js"></script>
<script src="js/olimpiadas.js"></script>
</head>
<body class="bg-background-page font-sans min-h-screen">
<header class="bg-white border-b border-border-subtle">
<div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex flex-wrap items-center justify-between gap-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center">
<span class="material-symbols-outlined">school</span>
</div>
<div>
<p class="text-xs font-bold text-primary uppercase tracking-wide">SIGA Educa</p>
<h1 class="text-lg font-bold text-on-surface">Portal do Aluno — Olimpíadas</h1>
</div>
</div>
<a href="login.html" class="text-sm font-semibold text-primary hover:underline flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">logout</span>
Sair
</a>
</div>
</header>

<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8 space-y-8">
<section class="bg-white rounded-2xl border border-border-subtle shadow-sm p-6">
<div class="flex flex-col md:flex-row md:items-end gap-4 justify-between">
<div>
<p class="inline-flex items-center px-3 py-1 bg-primary/10 rounded-full text-primary font-bold text-xs mb-3">CAMPANHA 2026</p>
<h2 class="text-2xl font-bold text-on-surface">Minhas Olimpíadas</h2>
<p class="text-sm text-text-secondary mt-1">Selecione seu nome e clique na olimpíada para se inscrever. Cada aluno só pode se inscrever uma vez por olimpíada.</p>
</div>
<div class="w-full md:w-80">
<label class="block text-[11px] font-bold text-text-secondary uppercase mb-1.5">Identificação do aluno</label>
<select id="portal-aluno-select" class="w-full px-4 py-2.5 border border-border-subtle rounded-xl outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-white"></select>
<p id="portal-aluno-info" class="text-xs text-text-secondary mt-2">Selecione o aluno para ver e realizar inscrições.</p>
</div>
</div>
</section>

<section>
<div class="flex items-center justify-between mb-4">
<h3 class="text-lg font-bold text-on-surface">Olimpíadas disponíveis</h3>
</div>
<div id="portal-olimpiadas-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
</section>
</main>

<div id="olimpiada-toast" class="fixed bottom-6 right-6 hidden z-[400] min-w-[260px] max-w-[420px] px-4 py-3 rounded-xl bg-[#121c2a] text-white text-sm font-medium shadow-lg"></div>
</body>
</html>
