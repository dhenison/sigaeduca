<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>SIGA EDUCA - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#bdc9c3",
                    "surface-dim": "#d3daea",
                    "surface-variant": "#dce2f3",
                    "on-error-container": "#93000a",
                    "on-background": "#151c27",
                    "on-surface": "#151c27",
                    "surface-tint": "#006d37",
                    "inverse-surface": "#2a313d",
                    "secondary-fixed-dim": "#c6c6c9",
                    "on-primary-fixed-variant": "#005228",
                    "on-tertiary-container": "#293430",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#e2e2e5",
                    "primary-fixed-dim": "#64de8b",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff",
                    "primary": "#006d37",
                    "on-secondary-fixed": "#1a1c1e",
                    "outline": "#6e7a6e",
                    "surface-bright": "#f9f9ff",
                    "secondary-container": "#e2e2e5",
                    "error": "#ba1a1a",
                    "surface": "#f9f9ff",
                    "background": "#f9f9ff",
                    "surface-container-high": "#e2e8f8",
                    "outline-variant": "#bdcabc",
                    "tertiary": "#55615c",
                    "on-primary-fixed": "#00210c",
                    "secondary": "#5d5e61",
                    "surface-container": "#e7eefe",
                    "primary-fixed": "#81fba5",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#003a1a",
                    "on-secondary-container": "#636467",
                    "tertiary-container": "#909d97",
                    "surface-container-highest": "#dce2f3",
                    "on-secondary-fixed-variant": "#454749",
                    "primary-container": "#2eaf62",
                    "on-surface-variant": "#3e4a3f",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#131e1a",
                    "tertiary-fixed": "#d9e5df",
                    "inverse-primary": "#64de8b",
                    "on-tertiary-fixed-variant": "#3d4944",
                    "surface-container-low": "#f0f3ff",
                    "inverse-on-surface": "#ebf1ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "touch-target": "48px",
                    "stack-gap-lg": "24px",
                    "stack-gap-sm": "8px",
                    "stack-gap-md": "16px",
                    "container-padding": "16px",
                    "inline-gutter": "12px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-sm": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "30px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "label-md-mobile": ["11px", {"lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-md-mobile": ["20px", {"lineHeight": "26px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                    "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "headline-sm-mobile": ["16px", {"lineHeight": "22px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .bg-pattern {
            background-color: #f9f9ff;
            background-image: radial-gradient(#bdcabc 0.5px, transparent 0.5px), radial-gradient(#bdcabc 0.5px, #f9f9ff 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.4;
        }

        .login-card {
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.95);
        }

        .input-focus-ring:focus-within {
            border-color: #006d37;
            box-shadow: 0 0 0 1px #006d37;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Geometric Pattern -->
<div class="absolute inset-0 bg-pattern z-0 pointer-events-none"></div>
<!-- Top Decorative Gradient -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-primary-fixed/20 to-transparent z-0"></div>
<main class="flex-1 flex flex-col items-center justify-center px-container-padding py-12 z-10">
<!-- Branding Header -->
<div class="mb-12 text-center animate-fade-in">
<div class="inline-flex items-center justify-center w-20 h-20 bg-primary-container rounded-2xl shadow-sm mb-6">
<span class="material-symbols-outlined text-on-primary-container text-[40px]" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight mb-2">SIGA EDUCA</h1>
<p class="font-body-md text-on-surface-variant opacity-80">Portal do Aluno</p>
</div>
<!-- Login Form Card -->
<div class="w-full max-w-md login-card border border-outline-variant rounded-xl p-8 shadow-sm">
<form action="#" class="space-y-stack-gap-lg" onsubmit="event.preventDefault();">
<!-- User Input -->
<div class="space-y-2">
<label class="font-label-md-mobile text-label-md-mobile text-on-surface-variant ml-1" for="username">Usuário ou E-mail</label>
<div class="relative flex items-center transition-all duration-200 border border-outline-variant rounded-lg bg-surface-container-lowest input-focus-ring">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant/60">person</span>
<input class="w-full h-touch-target pl-10 pr-4 bg-transparent border-none rounded-lg focus:ring-0 text-on-surface placeholder:text-on-surface-variant/40 transition-colors" id="username" name="username" placeholder="Seu login acadêmico" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="font-label-md-mobile text-label-md-mobile text-on-surface-variant ml-1" for="password">Senha</label>
<div class="relative flex items-center transition-all duration-200 border border-outline-variant rounded-lg bg-surface-container-lowest input-focus-ring">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant/60">lock</span>
<input class="w-full h-touch-target pl-10 pr-12 bg-transparent border-none rounded-lg focus:ring-0 text-on-surface placeholder:text-on-surface-variant/40 transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 flex items-center justify-center w-8 h-8 rounded-full hover:bg-surface-variant/50 transition-colors text-on-surface-variant/60" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-primary font-label-md-mobile text-label-md-mobile hover:underline active:opacity-70 transition-all" href="#">
                        Esqueci minha senha
                    </a>
</div>
<!-- Submit Button -->
<button class="w-full h-touch-target bg-primary-container hover:brightness-95 active:scale-95 text-on-primary-container font-headline-sm-mobile text-headline-sm-mobile rounded-lg transition-all duration-200 shadow-md flex items-center justify-center gap-2" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Additional Options -->
<div class="mt-8 pt-6 border-t border-outline-variant flex flex-col items-center gap-4">
<p class="font-body-md text-on-surface-variant text-sm">Novo por aqui?</p>
<button class="w-full h-touch-target bg-transparent border border-outline text-on-surface font-label-md-mobile text-label-md-mobile rounded-lg hover:bg-surface-variant/30 active:scale-95 transition-all">
                    Primeiro Acesso
                </button>
</div>
</div>
<!-- Footer / Support -->
<div class="mt-12 text-center text-on-surface-variant/60">
<p class="font-label-sm text-label-sm mb-2">© 2024 SIGA EDUCA - Sistema Integrado de Gestão Acadêmica</p>
<div class="flex items-center justify-center gap-4">
<a class="hover:text-primary transition-colors" href="#">Termos</a>
<span class="w-1 h-1 bg-on-surface-variant/40 rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Privacidade</a>
<span class="w-1 h-1 bg-on-surface-variant/40 rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Suporte</a>
</div>
</div>
</main>
<!-- Side Decoration (Hidden on small mobile, visible on tablet+) -->
<div class="hidden lg:block absolute bottom-10 right-10 w-64 h-64 opacity-10">
<div class="w-full h-full relative">
<div class="absolute top-0 left-0 w-32 h-32 border-4 border-primary rounded-full"></div>
<div class="absolute bottom-0 right-0 w-32 h-32 bg-primary rounded-xl rotate-45"></div>
</div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerText = 'visibility';
            }
        }

        // Micro-interaction for input fields
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
