<style>
        body {
            background-color: #f9f9ff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.25s ease, color 0.25s ease;

        html.siga-theme-dark body {
            background-color: #0f1419 !important;

<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Shared Component Strategy) -->
<header class="w-full sticky top-0 z-50 bg-surface shadow-sm flex justify-between items-center px-container-padding h-touch-target">
<button id="perfil-voltar" type="button" class="text-primary active:scale-95 transition-transform duration-150 flex items-center justify-center w-touch-target h-touch-target" title="Voltar">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary font-bold">Perfil</h1>
<span class="w-touch-target h-touch-target"></span>
</header>
<main class="pb-32 px-container-padding pt-stack-gap-lg max-w-md mx-auto">
<!-- Header Section: User Identity -->
<section class="flex flex-col items-center text-center mb-stack-gap-lg">
<div class="relative mb-stack-gap-md">
<div class="w-24 h-24 rounded-full overflow-hidden border-4 border-surface shadow-md bg-primary/15 text-primary flex items-center justify-center text-2xl font-bold">
<img id="perfil-avatar-img" class="w-full h-full object-cover hidden" alt=""/>
<span id="perfil-avatar-fallback" class="hidden">AL</span>
</div>
</div>
<h2 id="perfil-nome" class="font-headline-sm text-headline-sm text-on-surface">Aluno</h2>
<p id="perfil-turma" class="font-body-md text-body-md text-on-surface-variant mt-1">—</p>
</section>
<!-- Personalization Section: "Do Meu Jeito" -->
<section class="bg-surface-container-low rounded-xl p-container-padding shadow-sm mb-stack-gap-md">
<div class="flex items-center gap-2 mb-stack-gap-md">
<span class="material-symbols-outlined text-primary">palette</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Do Meu Jeito</h3>
</div>
<div class="flex items-center justify-between mb-stack-gap-lg">
<div>
<p class="font-body-lg text-body-lg text-on-surface">Aparência</p>
<p class="font-label-md text-label-md text-on-surface-variant">Modo Escuro ou Claro</p>
</div>
<button type="button" class="w-14 h-8 bg-surface-container-highest rounded-full p-1 relative transition-colors duration-300" id="themeToggle" aria-label="Alternar tema">
<div class="w-6 h-6 bg-white rounded-full shadow-md transform translate-x-0 transition-transform duration-300 flex items-center justify-center" id="toggleThumb">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">light_mode</span>
</div>
</button>
</div>
<div class="space-y-stack-gap-sm">
<p class="font-body-lg text-body-lg text-on-surface">Cor de Destaque</p>
<div id="perfil-cores" class="flex gap-4 overflow-x-auto py-2 custom-scrollbar">
<button type="button" data-accent="#006d37" class="flex-shrink-0 w-8 h-8 rounded-full bg-[#006d37] border-2 border-white ring-2 ring-primary" title="Verde"></button>
<button type="button" data-accent="#6750A4" class="flex-shrink-0 w-8 h-8 rounded-full bg-[#6750A4] border-2 border-transparent" title="Roxo"></button>
<button type="button" data-accent="#0061A4" class="flex-shrink-0 w-8 h-8 rounded-full bg-[#0061A4] border-2 border-transparent" title="Azul"></button>
<button type="button" data-accent="#BA1A1A" class="flex-shrink-0 w-8 h-8 rounded-full bg-[#BA1A1A] border-2 border-transparent" title="Vermelho"></button>
<button type="button" data-accent="#C9A227" class="flex-shrink-0 w-8 h-8 rounded-full bg-[#C9A227] border-2 border-transparent" title="Amarelo"></button>
<button type="button" data-accent="#5d5e61" class="flex-shrink-0 w-8 h-8 rounded-full bg-[#5d5e61] border-2 border-transparent" title="Cinza"></button>
</div>
</div>
</section>
<!-- Personal Info Section -->
<section class="bg-surface rounded-xl border border-outline-variant p-container-padding mb-stack-gap-md">
<div class="flex items-center gap-2 mb-stack-gap-lg">
<span class="material-symbols-outlined text-primary">person</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Informações Pessoais</h3>
</div>
<div class="space-y-stack-gap-lg">
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="perfil-input-nome">Nome Completo</label>
<input id="perfil-input-nome" readonly class="w-full h-touch-target px-4 bg-surface-container-low border border-outline rounded-lg font-body-lg outline-none text-on-surface-variant cursor-default" type="text" value=""/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="perfil-input-email">Email Acadêmico</label>
<input id="perfil-input-email" readonly class="w-full h-touch-target px-4 bg-surface-container-low border border-outline rounded-lg font-body-lg outline-none text-on-surface-variant cursor-default" type="email" value=""/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="perfil-input-telefone">Telefone</label>
<input id="perfil-input-telefone" class="w-full h-touch-target px-4 bg-surface-container-lowest border border-outline rounded-lg font-body-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" type="tel" placeholder="(00) 00000-0000" value=""/>
</div>
</div>
</section>
<!-- Academic Summary -->
<section class="bg-surface rounded-xl border border-outline-variant p-container-padding mb-stack-gap-md">
<div class="flex items-center justify-between gap-2 mb-stack-gap-md">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">description</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Resumo Acadêmico</h3>
</div>
<span id="perfil-bio-count" class="font-label-sm text-label-sm text-on-surface-variant">0/150</span>
</div>
<textarea id="perfil-input-bio" maxlength="150" class="w-full p-4 bg-surface-container-lowest border border-outline rounded-lg font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all resize-none" placeholder="Escreva algo sobre você (até 150 caracteres). Pode usar emojis 😊📚" rows="4"></textarea>
</section>
<section class="mb-stack-gap-md space-y-2">
<button id="perfil-salvar-dados" type="button" class="w-full h-touch-target bg-primary text-on-primary rounded-lg font-label-md flex items-center justify-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined text-sm">save</span>
Salvar
</button>
<p id="perfil-salvar-msg" class="text-sm text-primary text-center hidden">Dados salvos.</p>
</section>
</main>
<!-- Bottom nav: portal -->
<nav id="portal-aluno-bottom-nav" class="fixed bottom-0 left-0 right-0 z-50 flex justify-around items-center h-20 px-2 bg-white border-t border-slate-200 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] rounded-t-2xl max-w-lg mx-auto"></nav>
