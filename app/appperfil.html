<script>
        // Micro-interaction for Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const toggleThumb = document.getElementById('toggleThumb');
        const icon = toggleThumb.querySelector('span');
        let isDarkMode = false;

        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                toggleThumb.style.transform = 'translateX(24px)';
                themeToggle.classList.replace('bg-surface-container-highest', 'bg-primary');
                icon.textContent = 'dark_mode';
                icon.classList.replace('text-on-surface-variant', 'text-primary');
            } else {
                document.documentElement.classList.remove('dark');
                toggleThumb.style.transform = 'translateX(0)';
                themeToggle.classList.replace('bg-primary', 'bg-surface-container-highest');
                icon.textContent = 'light_mode';
                icon.classList.replace('text-primary', 'text-on-surface-variant');
            }
        });

        // Micro-interaction for Color Dots
        const colorDots = document.querySelectorAll('.custom-scrollbar button');
        colorDots.forEach(dot => {
            dot.addEventListener('click', () => {
                colorDots.forEach(d => {
                    d.classList.remove('ring-2', 'ring-primary', 'border-white');
                    d.classList.add('border-transparent');
                });
                dot.classList.remove('border-transparent');
                dot.classList.add('ring-2', 'ring-primary', 'border-white');
                
                // Simulate accent color change effect
                const color = window.getComputedStyle(dot).backgroundColor;
                document.documentElement.style.setProperty('--primary-color', color);
            });
        });

        // Form interaction feedback
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
